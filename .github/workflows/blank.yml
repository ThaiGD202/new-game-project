name: Build iOS

on:
  push:
    branches:
      - main
  pull_request:
    branches:
      - main

jobs:
  build:
    runs-on: macos-latest

    steps:
    - name: Checkout repository
      uses: actions/checkout@v4

    - name: Install Godot 4 via Homebrew
      run: |
        brew install --cask godot
        sudo ln -s /Applications/Godot.app/Contents/MacOS/Godot /usr/local/bin/godot

    - name: Download Godot 4.7 Export Templates Official
      env:
        GH_TOKEN: ${{ github.token }}
      run: |
        mkdir -p ~/Library/Application\ Support/Godot/export_templates/4.7.stable
        # Tải chính xác gói Export Templates dành cho Godot 4.7
        gh release download 4.7-stable --repo godotengine/godot --pattern "Godot_v4.7-stable_export_templates.tpz" -O templates.zip
        unzip templates.zip -d temp_templates
        mv temp_templates/templates/* ~/Library/Application\ Support/Godot/export_templates/4.7.stable/
        rm -rf temp_templates templates.zip


    - name: Configure and Export iOS Project
      run: |
        # Đảm bảo tạo thư mục build và thư mục chứa icon giả lập
        mkdir -p build
        mkdir -p icons
        
        # Tự động tạo một tệp ảnh PNG 1x1 pixel trống để đánh lừa bộ quét icon của Godot
        echo "iVBORw0KGgoAAAANSUhEUgAAAAEAAAABCAYAAAAfFcSJAAAADUlEQVR42mNk+M9QDwADhgGAWjR9awAAAABJRU5ErkJggg==" | base64 -d > icons/settings_58x58.png
        
        # Tạo file export_presets.cfg tự động tương thích Godot 4.7 và gán ảnh giả lập vừa tạo
        cat <<EOF > export_presets.cfg
        [preset.0]
        name="iOS"
        platform="iOS"
        runnable=true
        dedicated_server=false
        custom_features=""
        export_filter="all_resources"
        include_filter="*"
        exclude_filter=""
        export_path="build/mygame.xcodeproj"

        [preset.0.options]
        architectures/arm64=true
        application/app_store_team_id="12345ABCDE"
        application/provisioning_profile_uuid_debug=""
        application/provisioning_profile_uuid_release=""
        application/bundle_identifier="com.mycompany.mygame"
        application/signature=""
        application/short_version_string="1.0"
        application/version_code="1"
        application/name_en=""
        user_agent=""
        privacy/camera_usage_description="Camera access"
        privacy/microphone_usage_description="Microphone access"
        privacy/photolibrary_usage_description="Photo library access"
        icons/settings_58x58="res://icons/settings_58x58.png"
        EOF
        
        # Chạy lệnh quét và nhập khẩu tài nguyên mồi
        godot --headless --path . --editor --quit || true
        
        # Chạy lệnh xuất bản Godot 4 chính thức
        godot --headless --path . --export-debug "iOS" build/mygame.xcodeproj
        
        # Thay đổi Deployment Target lên iOS 13
        sed -i '' 's/IPHONEOS_DEPLOYMENT_TARGET = 11.0;/IPHONEOS_DEPLOYMENT_TARGET = 13.0;/' build/mygame.xcodeproj/project.pbxproj
        
        # Biên dịch dự án Xcode sang App
        xcodebuild -project build/mygame.xcodeproj \
                   -scheme mygame \
                   -configuration Development \
                   -archivePath build/mygame.xcarchive \
                   archive \
                   CODE_SIGNING_ALLOWED=NO \
                   CODE_SIGNING_REQUIRED=NO \
                   CODE_SIGN_IDENTITY="" \
                   PROVISIONING_PROFILE_SPECIFIER="" \
                   AD_HOC_CODE_SIGNING_ALLOWED=YES
        
        # Đóng gói sản phẩm thô thành file cấu trúc cài đặt .ipa
        cd build/mygame.xcarchive/Products/Applications
        mkdir Payload
        mv mygame.app Payload/
        zip -r ../../../../../App.ipa Payload/



    - name: Upload IPA to GitHub Artifacts
      uses: actions/upload-artifact@v4
      with:
        name: Ipa
        path: "App.ipa"
