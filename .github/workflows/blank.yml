name: Build iOS Multi-Stage

on:
  push:
    branches:
      - main
  pull_request:
    branches:
      - main

jobs:
  # GIAI ĐOẠN 1: Dùng máy Linux (RAM khỏe) để chạy Godot Export sang Xcode mà không sợ sập bộ nhớ
  export_xcode:
    runs-on: ubuntu-latest
    steps:
    - name: Checkout repository
      uses: actions/checkout@v4

    - name: Download Godot 4.3 Linux Headless Engine
      run: |
        # Tải trực tiếp bản engine không giao diện chính thức từ máy chủ Godot
        curl -L -o godot.zip https://github.com
        unzip godot.zip
        sudo mv Godot_v4.3-stable_linux.headless.x86_64 /usr/local/bin/godot
        rm -rf godot.zip

    - name: Download Godot 4.3 Export Templates Official
      env:
        GH_TOKEN: ${{ github.token }}
      run: |
        # Khởi tạo đúng đường dẫn lưu trữ thư mục mẫu xuất bản trên Linux
        mkdir -p ~/.local/share/godot/export_templates/4.3.stable
        gh release download 4.3-stable --repo godotengine/godot --pattern "Godot_v4.3-stable_export_templates.tpz" -O templates.zip
        unzip templates.zip -d temp_templates
        mv temp_templates/templates/* ~/.local/share/godot/export_templates/4.3.stable/
        rm -rf temp_templates templates.zip

    - name: Configure and Export iOS Project
      run: |
        mkdir -p build
        mkdir -p icons
        
        # Tự sinh tệp ảnh PNG 1x1 pixel trống làm icon mồi
        echo "iVBORw0KGgoAAAANSUhEUgAAAAEAAAABCAYAAAAfFcSJAAAADUlEQVR42mNk+M9QDwADhgGAWjR9awAAAABJRU5ErkJggg==" | base64 -d > icons/settings_58x58.png
        
        # Thiết lập tệp cấu hình xuất bản tự động export_presets.cfg
        cat <<EOF > export_presets.cfg
        [preset.0]
        name="iOS"
        platform="iOS"
        runnable=true
        dedicated_server=false
        custom_features=""
        export_filter="all_resources"
        include_filter="*"
        exclude_filter=""
        export_path="build/mygame.xcodeproj"

        [preset.0.options]
        architectures/arm64=true
        application/app_store_team_id="12345ABCDE"
        application/provisioning_profile_uuid_debug=""
        application/provisioning_profile_uuid_release=""
        application/bundle_identifier="com.mycompany.mygame"
        application/signature=""
        application/short_version_string="1.0"
        application/version_code="1"
        application/name_en=""
        user_agent=""
        privacy/camera_usage_description="Camera access"
        privacy/microphone_usage_description="Microphone access"
        privacy/photolibrary_usage_description="Photo library access"
        icons/settings_58x58="res://icons/settings_58x58.png"
        EOF
        
        # Chạy lệnh quét nạp tài nguyên hệ thống
        godot --headless --path . --editor --quit || true
        
        # Tiến hành giải nén và xuất dự án sang mã nguồn Xcode
        godot --headless --path . --export-debug "iOS" build/mygame.xcodeproj

    # Lưu trữ lại toàn bộ thư mục build (chứa mã nguồn Xcode) để chuyển giao sang máy Mac ở giai đoạn sau
    - name: Upload Xcode Project Artifact
      uses: actions/upload-artifact@v4
      with:
        name: xcode-project
        path: build/

  # GIAI ĐOẠN 2: Dùng máy Mac biên dịch mã nguồn Xcode thành tệp cài đặt IPA (Không lo sập RAM)
  build_ipa:
    needs: export_xcode
    runs-on: macos-latest
    steps:
    - name: Checkout repository
      uses: actions/checkout@v4

    # Tải lại thư mục mã nguồn Xcode đã được xử lý thành công từ máy Linux
    - name: Download Xcode Project Artifact
      uses: actions/download-artifact@v4
      with:
        name: xcode-project
        path: build/

    - name: Build and Package IPA
      run: |
        # Đẩy Deployment Target lên iOS 13 hỗ trợ máy ảo
        sed -i '' 's/IPHONEOS_DEPLOYMENT_TARGET = 11.0;/IPHONEOS_DEPLOYMENT_TARGET = 13.0;/' build/mygame.xcodeproj/project.pbxproj
        
        # Biên dịch dự án Xcode (Sử dụng Ad-hoc và bỏ qua yêu cầu chứng chỉ Apple)
        xcodebuild -project build/mygame.xcodeproj \
                   -scheme mygame \
                   -configuration Development \
                   -archivePath build/mygame.xcarchive \
                   archive \
                   CODE_SIGNING_ALLOWED=NO \
                   CODE_SIGNING_REQUIRED=NO \
                   CODE_SIGN_IDENTITY="" \
                   PROVISIONING_PROFILE_SPECIFIER="" \
                   AD_HOC_CODE_SIGNING_ALLOWED=YES
        
        # Di chuyển đóng gói sản phẩm Payload thô thành cấu trúc tệp cài đặt IPA hoàn thiện
        cd build/mygame.xcarchive/Products/Applications
        mkdir Payload
        mv mygame.app Payload/
        zip -r ../../../../../App.ipa Payload/

    - name: Upload IPA to GitHub Artifacts
      uses: actions/upload-artifact@v4
      with:
        name: Ipa
        path: "App.ipa"
