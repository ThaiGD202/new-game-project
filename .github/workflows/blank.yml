name: Build iOS Multi-Stage

on:
  push:
    branches:
      - main
  pull_request:
    branches:
      - main

jobs:
  # GIAI ĐOẠN 1: Dùng máy Linux (RAM khỏe) để chạy Godot Export sang Xcode
  export_xcode:
    runs-on: ubuntu-latest
    steps:
    - name: Checkout repository
      uses: actions/checkout@v4

    - name: Install Godot 4 via Linuxbrew
      run: |
        brew install godot
        # Tạo liên kết dòng lệnh để gọi godot trên Linux
        sudo ln -s /home/linuxbrew/.linuxbrew/bin/godot /usr/local/bin/godot

    - name: Download Godot 4.7 Export Templates Official
      env:
        GH_TOKEN: ${{ github.token }}
      run: |
        mkdir -p ~/.local/share/godot/export_templates/4.7.stable
        gh release download 4.7-stable --repo godotengine/godot --pattern "Godot_v4.7-stable_export_templates.tpz" -O templates.zip
        unzip templates.zip -d temp_templates
        mv temp_templates/templates/* ~/.local/share/godot/export_templates/4.7.stable/
        rm -rf temp_templates templates.zip

    - name: Configure and Export iOS Project
      run: |
        mkdir -p build
        mkdir -p icons
        
        # Tạo ảnh giả lập
        echo "iVBORw0KGgoAAAANSUhEUgAAAAEAAAABCAYAAAAfFcSJAAAADUlEQVR42mNk+M9QDwADhgGAWjR9awAAAABJRU5ErkJggg==" | base64 -d > icons/settings_58x58.png
        
        # Tạo file export_presets.cfg tự động
        cat <<EOF > export_presets.cfg
        [preset.0]
        name="iOS"
        platform="iOS"
        runnable=true
        dedicated_server=false
        custom_features=""
        export_filter="all_resources"
        include_filter="*"
        exclude_filter=""
        export_path="build/mygame.xcodeproj"

        [preset.0.options]
        architectures/arm64=true
        application/app_store_team_id="12345ABCDE"
        application/provisioning_profile_uuid_debug=""
        application/provisioning_profile_uuid_release=""
        application/bundle_identifier="com.mycompany.mygame"
        application/signature=""
        application/short_version_string="1.0"
        application/version_code="1"
        application/name_en=""
        user_agent=""
        privacy/camera_usage_description="Camera access"
        privacy/microphone_usage_description="Microphone access"
        privacy/photolibrary_usage_description="Photo library access"
        icons/settings_58x58="res://icons/settings_58x58.png"
        EOF
        
        # Quét mồi và Xuất bản dự án sang mã nguồn Xcode
        godot --headless --path . --editor --quit || true
        godot --headless --path . --export-debug "iOS" build/mygame.xcodeproj

    # Lưu trữ lại toàn bộ thư mục build (chứa mã nguồn Xcode) để chuyển giao sang máy Mac
    - name: Upload Xcode Project Artifact
      uses: actions/upload-artifact@v4
      with:
        name: xcode-project
        path: build/

  # GIAI ĐOẠN 2: Dùng máy Mac để biên dịch mã nguồn Xcode thành tệp cài đặt IPA
  build_ipa:
    needs: export_xcode
    runs-on: macos-latest
    steps:
    - name: Checkout repository
      uses: actions/checkout@v4

    # Tải lại thư mục mã nguồn Xcode đã được sinh ra từ máy Linux ở Job trước
    - name: Download Xcode Project Artifact
      uses: actions/download-artifact@v4
      with:
        name: xcode-project
        path: build/

    - name: Build and Package IPA
      run: |
        # Thay đổi Deployment Target lên iOS 13
        sed -i '' 's/IPHONEOS_DEPLOYMENT_TARGET = 11.0;/IPHONEOS_DEPLOYMENT_TARGET = 13.0;/' build/mygame.xcodeproj/project.pbxproj
        
        # Biên dịch dự án Xcode (Giả lập không ký số chứng chỉ Apple)
        xcodebuild -project build/mygame.xcodeproj \
                   -scheme mygame \
                   -configuration Development \
                   -archivePath build/mygame.xcarchive \
                   archive \
                   CODE_SIGNING_ALLOWED=NO \
                   CODE_SIGNING_REQUIRED=NO \
                   CODE_SIGN_IDENTITY="" \
                   PROVISIONING_PROFILE_SPECIFIER="" \
                   AD_HOC_CODE_SIGNING_ALLOWED=YES
        
        # Đóng gói cấu trúc thư mục Payload của file IPA
        cd build/mygame.xcarchive/Products/Applications
        mkdir Payload
        mv mygame.app Payload/
        zip -r ../../../../../App.ipa Payload/

    - name: Upload IPA to GitHub Artifacts
      uses: actions/upload-artifact@v4
      with:
        name: Ipa
        path: "App.ipa"
