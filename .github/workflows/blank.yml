name: Build iOS

on:
  push:
    branches:
      - main
  pull_request:
    branches:
      - main

jobs:
  build:
    runs-on: macos-latest

    steps:
    - name: Checkout repository
      uses: actions/checkout@v4

    # Sử dụng Action tự động cài đặt Godot 4.x và Export Templates chuẩn hóa
    - name: Setup Godot Engine
      uses: ammaraskar/setup-godot@v0.0.5
      with:
        version: "4.3" # Bạn có thể đổi thành "4.4" hoặc phiên bản mong muốn

    - name: Create build directory
      run: mkdir -p build

    # Tự động tạo tệp export_presets.cfg đúng chuẩn cấu trúc Godot 4
    - name: Pre-configure export presets
      run: |
        cat <<EOF > export_presets.cfg
        [preset.0]
        name="iOS"
        platform="iOS"
        runnable=true
        dedicated_server=false
        custom_features=""
        export_filter="all_resources"
        include_filter=""
        exclude_filter=""
        export_path="build/your_project_name.xcodeproj"

        [preset.0.options]
        architectures/arm64=true
        application/app_store_team_id="12345ABCDE"
        application/provisioning_profile_uuid_debug=""
        application/provisioning_profile_uuid_release=""
        application/bundle_identifier="com.mycompany.mygame"
        application/signature=""
        application/short_version_string="1.0"
        application/version_code="1"
        application/name_en=""
        user_agent=""
        privacy/camera_usage_description="Camera access"
        privacy/microphone_usage_description="Microphone access"
        privacy/photolibrary_usage_description="Photo library access"
        EOF

    # Lệnh xuất bản sử dụng biến môi trường Godot đã được thiết lập qua Action
    - name: Export iOS project
      run: godot --headless --export-debug "iOS" build/your_project_name.xcodeproj
        
    - name: Set iOS Deployment Target
      run: sed -i '' 's/IPHONEOS_DEPLOYMENT_TARGET = 11.0;/IPHONEOS_DEPLOYMENT_TARGET = 13.0;/' build/your_project_name.xcodeproj/project.pbxproj

    - name: Build iOS project
      run: xcodebuild -project build/your_project_name.xcodeproj -scheme your_project_name -configuration Development -archivePath build/your_project_name.xcarchive archive CODE_SIGN_IDENTITY="" CODE_SIGNING_REQUIRED=NO CODE_SIGNING_ALLOWED=NO

    - name: Export IPA
      run: | 
        cd build/your_project_name.xcarchive/Products/Applications
        mkdir Payload
        mv your_project_name.app Payload/
        zip -r ../../../App.ipa Payload/

    - name: Upload IPA to GitHub Artifacts
      uses: actions/upload-artifact@v4
      with:
        name: Ipa
        path: build/App.ipa
