name: Build iOS

on:
  push:
    branches:
      - main
  pull_request:
    branches:
      - main

jobs:
  build:
    runs-on: macos-latest

    steps:
    - name: Checkout repository
      uses: actions/checkout@v4

    - name: Download Godot Engine 4.3 Official
      env:
        GH_TOKEN: ${{ github.token }}
      run: |
        # Sử dụng GitHub CLI chính thức để tải bản Engine macOS, tránh hoàn toàn lỗi 562KB
        gh release download 4.3-stable --repo godotengine/godot --pattern "Godot_v4.3-stable_macos.universal.zip" -O godot.zip
        unzip godot.zip -d godot_extracted
        sudo mv godot_extracted/Godot.app /Applications/Godot.app
        sudo ln -s /Applications/Godot.app/Contents/MacOS/Godot /usr/local/bin/godot
        rm -rf godot.zip godot_extracted

    - name: Download Godot 4.3 Export Templates Official
      env:
        GH_TOKEN: ${{ github.token }}
      run: |
        mkdir -p ~/Library/Application\ Support/Godot/export_templates/4.3.stable
        # Tải gói export template chuẩn không bị máy chủ GitHub block đường truyền
        gh release download 4.3-stable --repo godotengine/godot --pattern "Godot_v4.3-stable_export_templates.tpz" -O templates.zip
        unzip templates.zip -d temp_templates
        mv temp_templates/templates/* ~/Library/Application\ Support/Godot/export_templates/4.3.stable/
        rm -rf temp_templates templates.zip

    - name: Configure, Mock Icons and Export iOS Project
      run: |
        mkdir -p build
        mkdir -p icons
        
        # Tự sinh tệp ảnh PNG 1x1 pixel trống làm icon mồi tại chỗ để bẻ gãy lỗi invalid icon
        echo "iVBORw0KGgoAAAANSUhEUgAAAAEAAAABCAYAAAAfFcSJAAAADUlEQVR42mNk+M9QDwADhgGAWjR9awAAAABJRU5ErkJggg==" | base64 -d > icons/settings_58x58.png
        
        # Tạo file export_presets.cfg tự động khớp hoàn toàn với câu lệnh export bên dưới
        cat <<EOF > export_presets.cfg
        [preset.0]
        name="iOS"
        platform="iOS"
        runnable=true
        dedicated_server=false
        custom_features=""
        export_filter="all_resources"
        include_filter="*"
        exclude_filter=""
        export_path="build/mygame.xcodeproj"

        [preset.0.options]
        architectures/arm64=true
        application/app_store_team_id="12345ABCDE"
        application/provisioning_profile_uuid_debug=""
        application/provisioning_profile_uuid_release=""
        application/bundle_identifier="com.mycompany.mygame"
        application/signature=""
        application/short_version_string="1.0"
        application/version_code="1"
        application/name_en=""
        user_agent=""
        privacy/camera_usage_description="Camera access"
        privacy/microphone_usage_description="Microphone access"
        privacy/photolibrary_usage_description="Photo library access"
        icons/settings_58x58="res://icons/settings_58x58.png"
        EOF
        
        # Khởi chạy mồi để nạp toàn bộ thư mục gốc vào bộ nhớ cache trước
        godot --headless --path . --editor --quit || true
        
        # Xuất dự án ra mã nguồn Xcode
        godot --headless --path . --export-debug "iOS" build/mygame.xcodeproj

    - name: Set iOS Deployment Target
      run: sed -i '' 's/IPHONEOS_DEPLOYMENT_TARGET = 11.0;/IPHONEOS_DEPLOYMENT_TARGET = 13.0;/' build/mygame.xcodeproj/project.pbxproj

    - name: Build iOS project via Xcodebuild
      run: |
        # Biên dịch không cần mã ký số Apple thực tế (Sử dụng Ad-hoc)
        xcodebuild -project build/mygame.xcodeproj \
                   -scheme mygame \
                   -configuration Development \
                   -archivePath build/mygame.xcarchive \
                   archive \
                   CODE_SIGNING_ALLOWED=NO \
                   CODE_SIGNING_REQUIRED=NO \
                   CODE_SIGN_IDENTITY="" \
                   PROVISIONING_PROFILE_SPECIFIER="" \
                   AD_HOC_CODE_SIGNING_ALLOWED=YES

    - name: Export IPA Package
      run: | 
        cd build/mygame.xcarchive/Products/Applications
        mkdir Payload
        mv mygame.app Payload/
        zip -r ../../../../../App.ipa Payload/

    - name: Upload IPA to GitHub Artifacts
      uses: actions/upload-artifact@v4
      with:
        name: Ipa
        path: "App.ipa"
